<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTAL KB ANANDA PRAJEKAN</title>
    
    <!-- Meta Tag Open Graph untuk Optimasi Preview WhatsApp -->
    <meta property="og:title" content="PORTAL KB ANANDA PRAJEKAN">
    <meta property="og:description" content="Sistem Informasi dan Portal Layanan Digital KB Ananda Prajekan.">
    <meta property="og:type" content="website">

    <style>
        /* Menghilangkan margin dan scrollbar bawaan browser */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        /* Membuat kontainer iframe memenuhi seluruh layar gawai / laptop */
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            overflow: hidden;
        }
        .app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Mengoptimalkan kelancaran geser layar (scrolling) di perangkat iOS/Safari */
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Menyematkan Google Apps Script langsung di bawah URL GitHub Anda -->
        <iframe class="app-iframe"
                src="https://script.google.com/macros/s/AKfycbx1_lwAHEL-dPZPOhfZtF3IjK4KKLgPg_GpXODl5ChNYEyj5kQpyTCdQm5zb8qOHwMv/exec"
                allow="geolocation; microphone; camera; encrypted-media; payment; autoplay"
                sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
                allowfullscreen="true">
        </iframe>
    </div>

</body>
</html>
